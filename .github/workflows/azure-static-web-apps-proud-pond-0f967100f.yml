name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  # Applies any pending Drizzle migrations to the production database before
  # the new API code is deployed. drizzle-kit migrate tracks already-applied
  # migrations itself, so this is a no-op push with no new migration files.
  # Runs only on real merges to main — never on PR preview builds, since those
  # shouldn't touch the shared production schema.
  migrate_database:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Migrate Database
    permissions:
      id-token: write # required for the OIDC federated login below
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      # Azure SQL's firewall rejects everything by default; GitHub-hosted
      # runners use unpredictable public IPs from a huge range, so a static
      # allow-list isn't practical. Instead, open a rule for just this run's
      # IP, migrate, then close it — scoped to the single run, not standing.
      - name: Determine runner public IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"
      - name: Azure login (OIDC, no stored secret)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Open temporary SQL firewall rule for this run
        run: |
          az sql server firewall-rule create \
            --resource-group PokemonResultTracker \
            --server pokemonresulttracker \
            --name gh-actions-ci-temp \
            --start-ip-address ${{ steps.ip.outputs.ip }} \
            --end-ip-address ${{ steps.ip.outputs.ip }}
          # Firewall changes can take a few seconds to propagate.
          sleep 15
      - run: npm run db:migrate
        env:
          SQL_SERVER: ${{ secrets.SQL_SERVER }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
      - name: Close temporary SQL firewall rule
        if: always()
        continue-on-error: true
        run: |
          az sql server firewall-rule delete \
            --resource-group PokemonResultTracker \
            --server pokemonresulttracker \
            --name gh-actions-ci-temp

  build_and_deploy_job:
    needs: [migrate_database]
    if: |
      always() &&
      (needs.migrate_database.result == 'success' || needs.migrate_database.result == 'skipped') &&
      (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed'))
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_POND_0F967100F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "/" # App source code path
          api_location: "api" # Api source code path - optional
          output_location: "build" # Built app content directory - optional
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_PROUD_POND_0F967100F }}
          action: "close"
